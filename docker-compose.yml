services:
  beltsecurity:
    build: .
    container_name: beltsecurity-web
    restart: unless-stopped

  nginx-proxy:
    image: nginx:alpine
    container_name: beltsecurity-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - beltsecurity
